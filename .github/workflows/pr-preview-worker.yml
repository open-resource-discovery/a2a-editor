name: PR Preview (worker)

on:
  workflow_run:
    workflows: ["PR Preview"]
    types: [completed]

jobs:
  pr-preview-fork-deploy:
    permissions:
      contents: read
      actions: read

    runs-on: [self-hosted, solinas]

    steps:
      - name: PR preview (worker)
        uses: open-resource-discovery/pr-preview-action@main
        with:
          token: ${{ secrets.PR_PREVIEW_TOKEN }}
